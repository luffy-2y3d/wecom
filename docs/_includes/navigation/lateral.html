<style>
/* 导航样式 */
#site-nav {
  width: 250px;
  background: #fafafa;
  border-right: 1px solid #e0e0e0;
  height: 100vh;
  overflow-y: auto;
  padding: 1rem 0;
}

.nav-group {
  padding: 0 1rem;
}

.nav-header {
  font-size: 1rem;
  font-weight: 700;
  color: #2c222b;
  padding: 0.5rem 0;
  margin-bottom: 0.5rem;
  border-bottom: 2px solid #5c5962;
}

.nav-list {
  list-style: none;
  margin: 0;
  padding: 0;
}

.nav-item {
  margin-bottom: 0.25rem;
}

.nav-link {
  display: block;
  padding: 0.625rem 0.75rem;
  color: #5c5962;
  text-decoration: none;
  font-size: 0.9rem;
  border-radius: 4px;
  transition: all 0.2s;
}

.nav-link:hover {
  background: #f0f0f0;
  color: #2c222b;
}

.nav-link.active {
  background: #e8f4fc;
  color: #0056b3;
  font-weight: 600;
}

/* 子导航 */
.nav-sublist {
  list-style: none;
  margin: 0.25rem 0 0.5rem 1rem;
  padding: 0;
  border-left: 2px solid #e0e0e0;
}

.nav-sublink {
  display: block;
  padding: 0.375rem 0.75rem;
  color: #7c7c7c;
  text-decoration: none;
  font-size: 0.8rem;
  transition: all 0.2s;
}

.nav-sublink:hover {
  color: #0056b3;
  background: #f5f5f5;
  padding-left: 1rem;
}

/* 父级菜单样式 */
.nav-parent > .nav-link::after {
  content: "▾";
  float: right;
  font-size: 0.7rem;
  transition: transform 0.2s;
}

.nav-parent.expanded > .nav-link::after {
  transform: rotate(180deg);
}

/* 展开/折叠 */
.nav-sublist {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease-out;
}

.nav-parent.expanded .nav-sublist {
  max-height: 500px;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const navParents = document.querySelectorAll('.nav-parent');
  navParents.forEach(function(parent) {
    parent.addEventListener('click', function(e) {
      if (e.target.classList.contains('nav-sublink')) {
        return;
      }
      e.preventDefault();
      this.classList.toggle('expanded');
    });
    
    // 检查URL是否包含当前导航的路径，自动展开
    const link = parent.querySelector('.nav-link');
    if (link && window.location.pathname.includes(link.getAttribute('href').split('/').pop().split('.')[0])) {
      parent.classList.add('expanded');
    }
  });
});
</script>
